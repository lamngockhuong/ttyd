name: release

on:
  push:
    tags: ["*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to publish (e.g. 1.7.7 or 1.7.7-fork1)"
        required: true

jobs:
  build:
    uses: ./.github/workflows/backend.yml
  publish:
    needs: [build]
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
      # The tag/version match only applies to tag-triggered releases; a manual
      # run publishes under the tag given as input.
      - name: Check version bump
        if: github.event_name != 'workflow_dispatch'
        run: |
          TAG=$(git describe --tags --match "[0-9]*.[0-9]*.[0-9]*" --abbrev=8)
          VERSION=$(grep project CMakeLists.txt| awk '{print $3}')
          if [ "$TAG" != "$VERSION" ]; then
            echo "=== Version in CMakeLists.txt and git tag does not match!"
            echo "=== Git Tag: $TAG, Version: $VERSION"
            exit 1
          fi
      - uses: actions/download-artifact@v8
        
      - run: |
          mkdir build
          for file in ttyd.*/*; do
            target=$(echo $file | awk -F/ '{print $1}')
            [[ $file == *.exe ]] && target="$target.exe"
            mv $file build/$target
          done
          pushd build; sha256sum ttyd.* > SHA256SUMS; popd
      - uses: ncipollo/release-action@v1
        with:
          artifacts: build/*
          allowUpdates: true
          draft: true
          tag: ${{ inputs.tag || github.ref_name }}
          commit: ${{ github.sha }}
